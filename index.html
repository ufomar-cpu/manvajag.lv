<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAPU | Tehnika un Materiāli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00b341; --dark: #121212; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: var(--text); overflow-x: hidden; line-height: 1.6; }
        
        /* Galvene */
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(18,18,18,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .logo { font-weight: 900; font-size: 1.5rem; text-decoration: none; color: white; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* Galvenā daļa */
        main { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; min-height: 80vh; }
        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; letter-spacing: -1px; }
        .sub-text { color: #aaa; font-size: 1rem; max-width: 500px; margin-bottom: 30px; }

        /* Slaidrāde */
        .slider-box { width: 100%; max-width: 550px; height: 350px; position: relative; border-radius: 20px; overflow: hidden; border: 2px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease-in-out; top: 0; left: 0; }
        .slide.active { opacity: 1; }

        /* Poga */
        .cta-btn { background: var(--primary); color: white; padding: 20px 45px; border-radius: 100px; font-weight: 900; text-transform: uppercase; border: none; font-size: 1.1rem; margin-top: 35px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 179, 65, 0.3); }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 179, 65, 0.4); }

        /* Kontakti */
        .contact-bar { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .c-icon { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        .c-wa { background: #25D366; color: white; }
        .c-tel { background: white; color: black; }

        /* Modālais logs */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; color: #1a1a1a; width: 100%; max-width: 450px; border-radius: 25px; padding: 35px; position: relative; }
        .modal-content h2 { font-weight: 900; margin-bottom: 20px; font-size: 1.6rem; }
        select, input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; background: #f9f9f9; }
        .send-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">AMA<span>PU</span></a>
</header>

<main>
    <h1>Beramās kravas & Tehnika</h1>
    <p class="sub-text">Piegādājam dolomīta šķembas, melnzemi, smilti un nodrošinām tehnikas pakalpojumus visā reģionā.</p>

    <div class="slider-box" id="mainSlider">
        <img src="skemba1.jpeg" class="slide active">
        <img src="melnz1.jpeg" class="slide">
        <img src="manipul1.jpeg" class="slide">
        <img src="transp1.jpeg" class="slide">
        <img src="zari1.jpeg" class="slide">
        <img src="skembas77.jpeg" class="slide">
        <img src="lapas.jpeg" class="slide">
        
        <img src="F1765E75-F7B2-4E80-8633-874C4000378E_1_105_c.jpeg" class="slide">
        <img src="F5082ED9-8131-4890-8800-2441C250E24D_1_105_c.jpeg" class="slide">
        <img src="F73480EB-595B-459E-91B8-19D43960100F_1_105_c.jpeg" class="slide">
        <img src="F182117C-B306-4475-8468-071DB68266CB_1_105_c.jpeg" class="slide">
        <img src="F9357105-702E-4BE6-B129-656175391C5B_1_105_c.jpeg" class="slide">
        <img src="FA09DEF2-9133-4003-886F-08F797963A0F_1_105_c.jpeg" class="slide">
        <img src="FA885843-8588-4F9C-A258-F1B81E153574_1_105_c.jpeg" class="slide">
        <img src="FB2874EA-6881-4C77-8025-C1781216E6A7_1_105_c.jpeg" class="slide">
        <img src="FBECA0DA-DA8B-4BBA-81E4-F65C05893C47_1_105_c.jpeg" class="slide">
        <img src="FC11D2E5-9614-4161-B61E-76F0E707E783_1_105_c.jpeg" class="slide">
        <img src="FC360A65-51C7-4584-A159-D21D099232F9_1_105_c.jpeg" class="slide">
        <img src="FD70BD52-EFA9-482B-ACE0-C7E3574CAFAF_1_105_c.jpeg" class="slide">
        <img src="FD915C2C-C4F6-4CD5-81CB-96D9DAC99EF8_1_105_c.jpeg" class="slide">
        <img src="FF7E8DC6-ADF1-42A8-A2DA-8FDE27040832_1_105_c.jpeg" class="slide">
    </div>

    <button class="cta-btn" onclick="openModal()">Veikt pasūtījumu</button>
</main>

<div class="contact-bar">
    <a href="tel:+37122312828" class="c-icon c-tel">📞</a>
    <a href="https://wa.me/37122312828" class="c-icon c-wa" target="_blank">💬</a>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>Pasūtījums</h2>
        <select id="prod">
            <option>Dolomīta šķembas (visas frakcijas)</option>
            <option>Melnzeme (sijāta/nesijāta)</option>
            <option>Smilts, grants, oļi</option>
            <option>Manipulatora pakalpojumi</option>
            <option>Tehnikas noma</option>
            <option>Cits pakalpojums</option>
        </select>
        <input type="text" id="loc" placeholder="Piegādes adrese">
        <input type="text" id="name" placeholder="Jūsu vārds">
        <textarea id="msg" placeholder="Daudzums vai papildus jautājumi" rows="3"></textarea>
        <button class="send-btn" onclick="sendToWA()">Sūtīt uz WhatsApp</button>
    </div>
</div>

<script>
    // Slaidera loģika
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const interval = 3500;

    function nextSlide() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
    }
    setInterval(nextSlide, interval);

    // Modālā loga vadība
    function openModal() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    // WhatsApp ziņas sūtīšana
    function sendToWA() {
        const product = document.getElementById('prod').value;
        const location = document.getElementById('loc').value;
        const name = document.getElementById('name').value;
        const message = document.getElementById('msg').value;
        
        const fullMsg = `Sveiki! Interesē: ${product}. %0AAdrese: ${location}. %0AVārds: ${name}. %0AInfo: ${message}`;
        window.open(`https://wa.me/37122312828?text=${fullMsg}`, '_blank');
    }
</script>

</body>
</html>
