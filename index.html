<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kravu Express | AMAPU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', Arial, sans-serif; }
        body, html { height: 100%; background: #121212; color: #ffffff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        header { padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 60px; background: #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.2rem; color: #ffffff; text-decoration: none; }
        .logo span { color: #00b341; }
        
        .lang-menu { display: flex; gap: 4px; }
        .lang-btn { color: #888; font-size: 0.75rem; font-weight: 700; padding: 6px 10px; border: 1px solid #444; border-radius: 4px; cursor: pointer; background: transparent; }
        .lang-btn.active { color: #00b341; border-color: #00b341; background: rgba(0, 179, 65, 0.1); }

        main { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh; text-align: center; padding: 20px 20px 110px 20px; }
        
        .story-slider { height: 40px; margin-bottom: 10px; overflow: hidden; }
        .story-slide { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; display: none; color: #00b341; letter-spacing: 1px; }
        .story-slide.active { display: block; }
        
        .hero-desc { max-width: 450px; font-size: 0.95rem; color: #bbb; margin-bottom: 25px; line-height: 1.4; }
        
        .slider-wrap { width: 100%; max-width: 500px; height: 320px; position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 30px; border: 2px solid #333; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slide-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease-in-out; top:0; left:0; }
        .slide-img.active { opacity: 1; }

        .btn-trigger { background: #00b341; color: white; padding: 20px 40px; border-radius: 50px; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; border: none; cursor: pointer; width: 100%; max-width: 320px; box-shadow: 0 5px 15px rgba(0, 179, 65, 0.3); }

        /* FIKSĒTĀ JOSLA APAKŠĀ */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 9999; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .nav-link { text-decoration: none; color: white; text-align: center; font-size: 0.75rem; font-weight: 800; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .nav-icon { width: 42px; height: 42px; margin-bottom: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .bg-wa { background: #25D366; }
        .bg-call { background: #007AFF; }
        .bg-sms { background: #8E8E93; }

        /* Modālais logs */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; color: #1a1a1a; width: 100%; max-width: 480px; border-radius: 24px; padding: 25px; position: relative; overflow-y: auto; max-height: 90vh; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2.2rem; cursor: pointer; color: #bbb; border: none; background: none; line-height: 1; }
        
        .unit-toggle { display: flex; background: #f0f0f0; border-radius: 12px; padding: 4px; margin: 15px 0; }
        .u-btn { flex: 1; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 0.85rem; transition: 0.2s; background: transparent; color: #666; }
        .u-btn.active { background: white; color: #00b341; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .vol-box { display: flex; align-items: center; justify-content: space-between; background: #f7f7f7; padding: 15px; border-radius: 16px; border: 1px solid #eee; margin-bottom: 12px; }
        .v-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: #1a1a1a; color: white; font-size: 1.6rem; cursor: pointer; }
        
        select, input, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; margin: 8px 0; font-size: 1rem; color: #000; background: #fff; -webkit-appearance: none; }
        textarea { resize: none; min-height: 80px; }
        .btn-final { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; text-transform: uppercase; background: #00b341; color: white; font-size: 1.1rem; margin-top: 15px; box-shadow: 0 4px 12px rgba(0, 179, 65, 0.2); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">KRAVU<span>EXPRESS</span></a>
    <div class="lang-menu">
        <button class="lang-btn active" onclick="changeLang('lv', this)">LV</button>
        <button class="lang-btn" onclick="changeLang('ru', this)">RU</button>
        <button class="lang-btn" onclick="changeLang('eng', this)">EN</button>
    </div>
</header>

<main>
    <div class="story-slider" id="story-slider-container"></div>
    <p class="hero-desc" id="hero-desc"></p>
    
    <div class="slider-wrap">
        <img src="skemba1.jpeg" class="slide-img active"> 
        <img src="manipul1.jpeg" class="slide-img">
        <img src="melnz1.jpeg" class="slide-img">
        <img src="skembas77.jpeg" class="slide-img">
        <img src="lapas.jpeg" class="slide-img">
    </div>

    <button class="btn-trigger" onclick="openModal()" id="btn-main"></button>
</main>

<div class="nav-bar">
    <a href="https://wa.me/37122312828" class="nav-link">
        <div class="nav-icon bg-wa">💬</div>
        <span>WhatsApp</span>
    </a>
    <a href="tel:+37122312828" class="nav-link">
        <div class="nav-icon bg-call">📞</div>
        <span id="nav-call"></span>
    </a>
    <a href="sms:+37122312828" class="nav-link">
        <div class="nav-icon bg-sms">✉️</div>
        <span>SMS</span>
    </a>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <h2 id="m-title" style="font-size:1.2rem; margin-bottom:5px; font-weight:900;"></h2>
        
        <div class="unit-toggle">
            <button id="um" class="u-btn active" onclick="setUnit('m³')">M³</button>
            <button id="ut" class="u-btn" onclick="setUnit('t')"><span id="u-tons"></span></button>
        </div>
        
        <div class="vol-box">
            <button class="v-btn" onclick="chV(-1)">−</button>
            <div id="vol-display" style="font-weight:900; font-size:1.4rem; color:#000;">1 m³</div>
            <button class="v-btn" onclick="chV(1)">+</button>
        </div>

        <select id="main-cat" onchange="updateSub()"></select>
        <select id="sub-cat" style="display:none;"></select>
        
        <input type="text" id="adr">
        <input type="text" id="user">
        <input type="tel" id="tel" value="+371 ">
        <textarea id="comm"></textarea>
        
        <button class="btn-final" onclick="send()" id="b-o"></button>
    </div>
</div>

<script>
    var translations = {
        lv: {
            titles: ["Beramās kravas", "Tehnikas noma", "Demontāža"],
            desc: "Piegādājam pamatu Jūsu jaunajai mājai, ceļam un nākotnei.",
            btn: "Sākt pasūtījumu",
            mats_label: "Izvēlieties materiālu",
            mats: {
                "Dolomīta šķembas (maisījums)": ["0-16 mm", "0-32 mm", "0-45 mm", "0-56 mm", "0-63 mm"],
                "Dolomīta šķembas (šķirotas)": ["8-32 mm", "5-40 mm", "16-40 mm", "40-70 mm"],
                "Dolomīta šķembas (mazgātas)": ["0-2 mm", "0-5 mm", "2-8 mm", "8-16 mm", "16-32 mm"],
                "Granīta šķembas": ["2-8 mm", "8-16 mm", "5-20 mm", "20-40 mm", "Atsijas"],
                "Drupināti būvgruži": ["0-16 mm", "0-32 mm", "0-45 mm", "0-56 mm", "0-63 mm", "20-40 mm", "40-70 mm"],
                "Oļi": ["8-16 mm", "16-32 mm"],
                "Smilts": ["Mazgāta 0-2 mm", "Mazgāta 0-4 mm", "Nemazgāta", "Pieberamā"],
                "Grants": ["Skalota 0-4 mm", "Neskalota 0-4 mm", "Dabīgā"],
                "Melnzeme": ["Sijāta", "Nesijāta"],
                "Asfalts": ["Frēzēts", "Karstais"], 
                "Pakalpojumi": ["Pašizgāzējs", "Manipulators", "Demontāža", "Rakšana", "Izvešana"]
            },
            adr: "Piegādes adrese", user: "Vārds", comm: "Papildus informācija",
            call: "Zvanīt", order_btn: "SŪTĪT WHATSAPP", m_title: "Konfigurēt pasūtījumu", tons: "TONNAS"
        },
        ru: {
            titles: ["Сыпучие грузы", "Аренда техники", "Демонтаж"],
            desc: "Доставляем основу для вашего дома, дороги и будущего.",
            btn: "Начать заказ",
            mats_label: "Выберите материал",
            mats: {
                "Доломитовый щебень (смесь)": ["0-16 мм", "0-32 мм", "0-45 мм", "0-56 мм", "0-63 мм"],
                "Доломитовый щебень (фракция)": ["8-32 мм", "5-40 мм", "16-40 мм", "40-70 мм"],
                "Доломитовый щебень (мытый)": ["0-2 мм", "0-5 мм", "2-8 мм", "8-16 мм", "16-32 мм"],
                "Гранитный щебень": ["2-8 мм", "8-16 мм", "5-20 мм", "20-40 мм", "Отсев"],
                "Строительный мусор (дробленый)": ["0-16 мм", "0-32 мм", "0-45 мм", "0-56 мм", "0-63 мм", "20-40 мм", "40-70 мм"],
                "Галька": ["8-16 мм", "16-32 мм"],
                "Песок": ["Мытый 0-2 мм", "Мытый 0-4 мм", "Не мытый", "Для подсыпки"],
                "Гравий": ["Мытый 0-4 мм", "Не мытый 0-4 мм", "Природный"],
                "Чернозем": ["Просеянный", "Не просеянный"],
                "Асфальт": ["Фрезерованный", "Горячий"],
                "Услуги": ["Самосвал", "Манипулятор", "Демонтаж", "Раскопки", "Вывоз"]
            },
            adr: "Адрес доставки", user: "Имя", comm: "Дополнительная информация",
            call: "Позвонить", order_btn: "ОТПРАВИТЬ В WA", m_title: "Конфигурация заказа", tons: "ТОННЫ"
        },
        eng: {
            titles: ["Bulk Cargo", "Equipment Rental", "Demolition"],
            desc: "Delivering the foundation for your house, road and future.",
            btn: "Start Order",
            mats_label: "Choose material",
            mats: {
                "Dolomite stones (mix)": ["0-16 mm", "0-32 mm", "0-45 mm", "0-56 mm", "0-63 mm"],
                "Dolomite stones (sorted)": ["8-32 mm", "5-40 mm", "16-40 mm", "40-70 mm"],
                "Dolomite stones (washed)": ["0-2 mm", "0-5 mm", "2-8 mm", "8-16 mm", "16-32 mm"],
                "Granite stones": ["2-8 mm", "8-16 mm", "5-20 mm", "20-40 mm", "Screenings"],
                "Crushed construction waste": ["0-16 mm", "0-32 mm", "0-45 mm", "0-56 mm", "0-63 mm", "20-40 mm", "40-70 mm"],
                "Pebbles": ["8-16 mm", "16-32 mm"],
                "Sand": ["Washed 0-2 mm", "Washed 0-4 mm", "Unwashed", "Filling sand"],
                "Gravel": ["Washed 0-4 mm", "Unwashed 0-4 mm", "Natural"],
                "Black soil": ["Sieved", "Unsieved"],
                "Asphalt": ["Milled", "Hot mix"],
                "Services": ["Dump truck", "Manipulator", "Demolition", "Digging", "Removal"]
            },
            adr: "Delivery address", user: "Name", comm: "Additional info",
            call: "Call", order_btn: "SEND TO WA", m_title: "Configure Order", tons: "TONS"
        }
    };

    var curLang = 'lv';
    var vol = 1;
    var unit = 'm³';

    function changeLang(l, btn) {
        curLang = l;
        var t = translations[l];
        var btns = document.getElementsByClassName('lang-btn');
        for (var i = 0; i < btns.length; i++) btns[i].className = 'lang-btn';
        btn.className = 'lang-btn active';

        document.getElementById('hero-desc').innerHTML = t.desc;
        document.getElementById('btn-main').innerHTML = t.btn;
        document.getElementById('m-title').innerHTML = t.m_title;
        document.getElementById('adr').placeholder = t.adr;
        document.getElementById('user').placeholder = t.user;
        document.getElementById('comm').placeholder = t.comm;
        document.getElementById('nav-call').innerHTML = t.call;
        document.getElementById('b-o').innerHTML = t.order_btn;
        document.getElementById('u-tons').innerHTML = t.tons;
        
        var mSel = document.getElementById('main-cat');
        mSel.innerHTML = '<option disabled selected>' + t.mats_label + '</option>';
        for (var key in t.mats) {
            var o = document.createElement('option');
            o.value = key; o.innerHTML = key; mSel.appendChild(o);
        }
        
        var sliderCont = document.getElementById('story-slider-container');
        sliderCont.innerHTML = '';
        for (var j = 0; j < t.titles.length; j++) {
            var d = document.createElement('div');
            d.className = 'story-slide' + (j === 0 ? ' active' : '');
            d.innerHTML = t.titles[j];
            sliderCont.appendChild(d);
        }
        updateDisplay();
        sIdx = 0;
    }

    function setUnit(u) { 
        unit = u; 
        document.getElementById('um').className = 'u-btn' + (u === 'm³' ? ' active' : '');
        document.getElementById('ut').className = 'u-btn' + (u === 't' ? ' active' : '');
        updateDisplay(); 
    }
    
    function chV(s) { vol = Math.max(1, vol + s); updateDisplay(); }
    function updateDisplay() { document.getElementById('vol-display').innerHTML = vol + " " + unit; }

    function updateSub() {
        var main = document.getElementById('main-cat').value;
        var sub = document.getElementById('sub-cat');
        var items = translations[curLang].mats[main];
        sub.innerHTML = '';
        if (items && items.length > 0) {
            for (var i = 0; i < items.length; i++) {
                var o = document.createElement('option');
                o.value = items[i]; o.innerHTML = items[i]; sub.appendChild(o);
            }
            sub.style.display = 'block';
        } else {
            sub.style.display = 'none';
        }
    }

    function openModal() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    function send() {
        var m = document.getElementById('main-cat').value;
        var s = document.getElementById('sub-cat').value || "";
        var a = document.getElementById('adr').value;
        var u = document.getElementById('user').value;
        var ph = document.getElementById('tel').value;
        var co = document.getElementById('comm').value;
        if (!m || m === translations[curLang].mats_label || !a) { alert('Aizpildiet materiālu un adresi!'); return; }
        
        var orderText = curLang === 'lv' ? 'PASŪTĪJUMS' : curLang === 'ru' ? 'ЗАКАЗ' : 'ORDER';
        var msg = "*" + orderText + "*\n📦 " + m + " (" + s + ")\n⚖️ " + vol + unit + "\n📍 " + a + "\n👤 " + u + "\n📞 " + ph + "\n💬 " + co;
        window.open('https://wa.me/37122312828?text=' + encodeURIComponent(msg), '_blank');
    }

    var sIdx = 0;
    setInterval(function() {
        var s = document.getElementsByClassName('story-slide');
        if (s.length > 0) {
            s[sIdx].className = 'story-slide';
            sIdx = (sIdx + 1) % s.length;
            s[sIdx].className = 'story-slide active';
        }
    }, 3000);

    var gIdx = 0;
    setInterval(function() {
        var g = document.getElementsByClassName('slide-img');
        if (g.length > 0) {
            g[gIdx].className = 'slide-img';
            gIdx = (gIdx + 1) % g.length;
            g[gIdx].className = 'slide-img active';
        }
    }, 4000);

    window.onload = function() { changeLang('lv', document.getElementsByClassName('lang-btn')[0]); };
</script>
</body>
</html>
